name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install libssl1.1 for SQLCipher
        # SQLCipher's prebuilt binary links against libssl.so.1.1. Ubuntu 24.04
        # runners ship OpenSSL 3 only, so pull the older deb from launchpad.
        run: |
          sudo wget -q http://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          rm libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Standalone build smoke test
        # `npm run build` runs next build + scripts/stage-standalone.js.
        # Make sure the standalone bundle exists and the native binding
        # got copied into it.
        run: |
          npm run build
          test -f .next/standalone/server.js
          test -f .next/standalone/node_modules/@journeyapps/sqlcipher/lib/binding/napi-v6-linux-x64/node_sqlite3.node
          test -d .next/standalone/public
          test -d .next/standalone/plugins
