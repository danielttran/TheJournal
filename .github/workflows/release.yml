name: Release

# Triggers on push of a semver tag like v1.2.3. Build the Windows NSIS
# installer + electron-updater manifest and publish them to the
# corresponding GitHub Release.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-windows:
    name: Build Windows NSIS installer
    runs-on: windows-latest
    permissions:
      # electron-builder needs to create the GitHub Release and upload artifacts.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Refuse to publish a broken installer. The release workflow is the
      # last chance to catch regressions — if tsc or tests fail, the
      # GitHub Release never gets created and electron-updater clients
      # keep the previous version.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build installer
        # build:installer compiles Next.js, then rebuilds @journeyapps/sqlcipher's
        # native binding and invokes electron-builder. The install-sqlite step rebuilds the
        # binding against the Electron runtime's V8 ABI. electron-builder
        # then bundles the installer and — because electron-builder.yml has
        # a `publish: github` block — uploads it to the Release for this
        # tag (creating the Release if needed).
        run: npm run build:installer
        env:
          # electron-builder picks up GH_TOKEN to authenticate the upload.
          # The default GITHUB_TOKEN has `contents: write` from `permissions`
          # above, which is exactly what electron-builder needs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
