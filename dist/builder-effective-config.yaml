directories:
  output: dist
  buildResources: build
appId: com.thejournal.app
productName: TheJournal
files:
  - filter:
      - '**/*'
      - '!**/*.ts'
      - '!*.map'
      - '!package-lock.json'
      - '!src/app/**/*'
      - src/electron/**/*
      - public/**/*
      - .next/**/*
      - package.json
      - node_modules/**/*
asar: true
win:
  target: nsis
  icon: public/favicon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TheJournal
npmRebuild: false
electronVersion: 33.2.1
