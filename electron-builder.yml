appId: com.thejournal.app
productName: TheJournal
directories:
  output: dist
files:
  - "**/*"
  - "!**/*.ts"
  - "!*.map"
  - "!package-lock.json"
  - "!src/app/**/*" 
  # Note: logic relies on .next and node_modules, src/app is compiled to .next
  # But we might need src/electron
  - "src/electron/**/*"
  - "public/**/*"
  - ".next/**/*"
  - "package.json"
  - "node_modules/**/*"

asar: true

win:
  target: nsis
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "TheJournal"

# Required so electron-builder rebuilds @journeyapps/sqlcipher (native C++
# module) against the Electron runtime's V8 ABI before packaging. Without this
# the installer ships a binding compiled for Node's ABI and the app crashes on
# first DB access. scripts/install-sqlite.js runs an explicit rebuild first as
# a belt-and-braces measure.
npmRebuild: true

# electron-updater reads this block at runtime to find the latest release.
# The release workflow (.github/workflows/release.yml) uploads the .exe AND
# a `latest.yml` manifest to the GitHub Release; the running app polls that
# manifest and downloads the new version when its version > the installed one.
publish:
  - provider: github
    owner: danielttran
    repo: TheJournal
