appId: com.thejournal.app
productName: TheJournal
directories:
  output: dist
files:
  - "**/*"
  - "!**/*.ts"
  - "!*.map"
  - "!package-lock.json"
  - "!src/app/**/*" 
  # Note: logic relies on .next and node_modules, src/app is compiled to .next
  # But we might need src/electron
  - "src/electron/**/*"
  - "public/**/*"
  - ".next/**/*"
  - "package.json"
  - "node_modules/**/*"

asar: true

win:
  target: nsis
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
