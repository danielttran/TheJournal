appId: com.thejournal.app
productName: TheJournal
directories:
  output: dist
files:
  # Keep the desktop installer runtime-only. In particular, do not start from
  # "**/*": a developer checkout can contain journal.tjdb / journal.db files,
  # backups, screenshots, tests, and other private or unnecessary artifacts.
  - "package.json"
  # Electron embeds Next.js from .next/ directly. Package only its runtime
  # surface: never include web standalone output, build caches, or diagnostics.
  - ".next/BUILD_ID"
  - ".next/*.json"
  - ".next/server/**/*"
  - ".next/static/**/*"
  - "node_modules/**/*"
  - "public/**/*"
  - "plugins/**/*"
  - "src/electron/**/*"
  # Plain-JS libs that the Electron main process requires at runtime. These
  # MUST be whitelisted explicitly (the src/ tree is otherwise excluded), or
  # the packaged app crashes on launch with "Cannot find module".
  - "src/lib/menuSpec.js"
  - "src/lib/windowState.js"
  - "src/lib/menuCustomization.js"

asar: true

win:
  target: nsis
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "TheJournal"

# Cross-platform desktop targets. The single Electron codebase runs on all three
# OSes (same embedded Next.js server + native menu built from the shared spec).
# macOS builds are unsigned here (notarization/signing needs an Apple Developer
# certificate supplied via CSC_LINK/CSC_KEY_PASSWORD at release time); the dmg
# + zip targets are required for electron-updater on mac.
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: public/favicon.ico

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: public/favicon.ico

# Required so electron-builder rebuilds @journeyapps/sqlcipher (native C++
# module) against the Electron runtime's V8 ABI before packaging. Without this
# the installer ships a binding compiled for Node's ABI and the app crashes on
# first DB access. scripts/install-sqlite.js runs an explicit rebuild first as
# a belt-and-braces measure.
npmRebuild: true

# electron-updater reads this block at runtime to find the latest release.
# The release workflow (.github/workflows/release.yml) uploads the .exe AND
# a `latest.yml` manifest to the GitHub Release; the running app polls that
# manifest and downloads the new version when its version > the installed one.
publish:
  - provider: github
    owner: danielttran
    repo: TheJournal
